<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        button {
            background: #4facfe;
            border: none;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        #msg {
            margin-top: 20px;
            font-size: 18px;
            color: green;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📋 Attendance System</h1>

        <button onclick="markAttendance()">Mark Attendance</button>

        <p id="msg"></p>

        <div class="footer">
            Powered by AWS CI/CD 🚀
        </div>
    </div>

    <script>
        function markAttendance() {
            document.getElementById("msg").innerHTML = "✅ Attendance Marked Successfully!";
        }
    </script>

</body>
</html>
